services:
  - type: web
    name: mizizzi-backend
    runtime: python
    buildCommand: bash render-build.sh
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_CONFIG
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: mizizzi-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mizizzi-redis
          property: connectionString
      - key: PORT
        value: "8080"

databases:
  - name: mizizzi-postgres
    database: mizizzi_project
    user: postgres

redis:
  - name: mizizzi-redis
